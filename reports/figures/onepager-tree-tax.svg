<text x="540" y="335" text-anchor="middle" font-size="24" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">→</text>
<rect x="565" y="262" width="200" height="132" rx="12" fill="#FBF8F0" stroke="#E4DDCC" stroke-width="1.5"/>
<text x="583" y="296" text-anchor="start" font-size="17" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#1C3A55" font-weight="700">turn 3</text>
<text x="583" y="320" text-anchor="start" font-size="14" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">fetch another</text>
<rect x="583" y="340" width="28.6" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="594" y="349.9" width="22" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="594" y="359.8" width="22" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="605" y="369.7" width="15.4" height="4.95" rx="2.2" fill="#C04818"/>
<text x="629" y="362" text-anchor="start" font-size="13.5" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#C04818" font-weight="600">+ tree, again</text>
<text x="790" y="335" text-anchor="middle" font-size="24" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">→</text>
<rect x="815" y="262" width="200" height="132" rx="12" fill="#FBF8F0" stroke="#E4DDCC" stroke-width="1.5"/>
<text x="833" y="296" text-anchor="start" font-size="17" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#1C3A55" font-weight="700">turn n</text>
<text x="833" y="320" text-anchor="start" font-size="14" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">answer</text>
<rect x="833" y="340" width="28.6" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="844" y="349.9" width="22" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="844" y="359.8" width="22" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="855" y="369.7" width="15.4" height="4.95" rx="2.2" fill="#C04818"/>
<text x="879" y="362" text-anchor="start" font-size="13.5" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#C04818" font-weight="600">+ tree, again</text>
<rect x="64" y="428" width="952" height="56" rx="10" fill="#F0EBDF"/>
<text x="540" y="464" text-anchor="middle" font-size="17" font-family="'SF Mono', Menlo, Consolas, monospace" fill="#1C3A55" font-weight="600">tree tokens  ×  turns per question  ×  questions  =  recurring input cost</text>
<text x="64" y="556" text-anchor="start" font-size="19" font-family="Fraunces, Georgia, 'Times New Roman', serif" fill="#1C3A55" font-weight="600">How big is the tree? (same 339-node website corpus)</text>
<path d="M64,586 h155.224 a4,4 0 0 1 4,4 v22 a4,4 0 0 1 -4,4 h-155.224 z" fill="#186090"/>
<text x="235.224" y="607" text-anchor="start" font-size="14" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#2B2B2B">8.9K tokens · headings only</text>
<path d="M64,632 h628.974 a4,4 0 0 1 4,4 v22 a4,4 0 0 1 -4,4 h-628.974 z" fill="#C04818"/>
<text x="708.974" y="653" text-anchor="start" font-size="14" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#2B2B2B">35.5K · real summaries on every node</text>
<path d="M64,678 h775.366 a4,4 0 0 1 4,4 v22 a4,4 0 0 1 -4,4 h-775.366 z" fill="#C04818"/>
<text x="829.366" y="699" text-anchor="end" font-size="14" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#F4F0E8" font-weight="600">43.7K · “add summaries” default — 80% verbatim copies</text>
<text x="64" y="740" text-anchor="start" font-size="14.5" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">The default was the largest artifact of every condition built — a feature that mostly wasn't running, billed on every turn.</text>
<text x="64" y="800" text-anchor="start" font-size="19" font-family="Fraunces, Georgia, 'Times New Roman', serif" fill="#1C3A55" font-weight="600">What it cost (measured, same questions, same navigator)</text>
<rect x="64" y="822" width="464" height="140" rx="14" fill="#FBF8F0" stroke="#E4DDCC"/>
<text x="90" y="854" text-anchor="start" font-size="15" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66" font-weight="600">Website · 14 questions</text>
<text x="90" y="904" text-anchor="start" font-size="34" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#186090" font-weight="700">$0.80</text>
<text x="90" y="930" text-anchor="start" font-size="13" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">headings tree</text>
<text x="310" y="904" text-anchor="start" font-size="34" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#C04818" font-weight="700">$3.29</text>
<text x="310" y="930" text-anchor="start" font-size="13" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">summary tree · 4.1×</text>
<rect x="552" y="822" width="464" height="140" rx="14" fill="#FBF8F0" stroke="#E4DDCC"/>
<text x="578" y="854" text-anchor="start" font-size="15" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66" font-weight="600">RFC 9110 · 24 questions</text>
<text x="578" y="904" text-anchor="start" font-size="34" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#186090" font-weight="700">$1.30</text>
<text x="578" y="930" text-anchor="start" font-size="13" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">headings tree</text>
<text x="798" y="904" text-anchor="start" font-size="34" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#C04818" font-weight="700">$6.01</text>
<text x="798" y="930" text-anchor="start" font-size="13" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">summary tree · 4.6×</text>
<rect x="64" y="1010" width="952" height="118" rx="14" fill="#FBF8F0" stroke="#E4DDCC"/>
<rect x="64" y="1026" width="6" height="86" rx="3" fill="#C04818"/>
<text x="98" y="1058" text-anchor="start" font-size="17" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#1C3A55" font-weight="600">Index-build cost is a one-time line item everyone sees. The re-sent tree is the cost nobody prices.</text>
<text x="98" y="1092" text-anchor="start" font-size="15" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#2B2B2B">Before enriching an index, price the enrichment times every turn it will ride along on.</text>
<line x1="64" y1="1268" x2="1016" y2="1268" stroke="#E4DDCC" stroke-width="1.5"/>
<text x="64" y="1294" text-anchor="start" font-size="13.5" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">Structure tokens &amp; costs from recorded runs · details in the consolidated results</text>
<text x="1016" y="1294" text-anchor="end" font-size="13.5" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#186090" font-weight="600">barbhs.com/blog/measuring-pageindex</text>
</svg>
