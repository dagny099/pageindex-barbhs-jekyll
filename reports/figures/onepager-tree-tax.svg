<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif">
<rect width="1080" height="1350" fill="#F4F0E8"/>
<text x="64" y="96" text-anchor="start" font-size="44" font-family="Fraunces, Georgia, 'Times New Roman', serif" fill="#1C3A55" font-weight="600">The Tree Tax</text>
<text x="64" y="132" text-anchor="start" font-size="17.5" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">The recurring RAG cost that never shows up in the demo</text>
<text x="64" y="196" text-anchor="start" font-size="16" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#2B2B2B">Vectorless RAG sends the agent a tree of the document. The tree stays in context —</text>
<text x="64" y="222" text-anchor="start" font-size="16" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#2B2B2B" font-weight="600">so every later turn re-bills it as input.</text>
<rect x="65" y="262" width="200" height="132" rx="12" fill="#FBF8F0" stroke="#E4DDCC" stroke-width="1.5"/>
<text x="83" y="296" text-anchor="start" font-size="17" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#1C3A55" font-weight="700">turn 1</text>
<text x="83" y="320" text-anchor="start" font-size="14" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">read the tree</text>
<rect x="83" y="340" width="28.6" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="94" y="349.9" width="22" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="94" y="359.8" width="22" height="4.95" rx="2.2" fill="#C04818"/>
<rect x="105" y="369.7" width="15.4" height="4.95" rx="2.2" fill="#C04818"/>
<text x="129" y="362" text-anchor="start" font-size="13.5" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#C04818" font-weight="600">+ tree, again</text>
<text x="290" y="335" text-anchor="middle" font-size="24" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">→</text>
<rect x="315" y="262" width="200" height="132" rx="12" fill="#FBF8F0" stroke="#E4DDCC" stroke-width="1.5"/>
<text x="333" y="296" text-anchor="start" font-size="17" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#1C3A55" font-weight="700">turn 2</text>
<text x="333" y="320" text-anchor="start" font-size="14" font-family="'Hanken Grotesk', 'Public Sans', 'Helvetica Neue', Arial, sans-serif" fill="#6B6B66">fetch a section</text>
<rect x="333" y="340" width="28.6" height="4.95" rx="2.2" fill="#C04818"/>
